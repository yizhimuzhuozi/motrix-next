name: Build and Publish Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            args: --target aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf xdg-utils

      - run: pnpm install

      - name: Debug release info
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Release ID: ${{ github.event.release.id }}"
          echo "Release Tag: ${{ github.event.release.tag_name }}"
          echo "Upload to Release: ${{ github.event_name == 'release' }}"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: ${{ contains(matrix.args, 'aarch64-unknown-linux') && 'true' || '' }}
        with:
          tagName: ${{ github.event.release.tag_name || '' }}
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  merge-updater-json:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Generate merged latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          mkdir -p sigs
          gh release download "$TAG" -R "${{ github.repository }}" -p "*.sig" -D sigs

          echo "Downloaded signatures:"
          ls -la sigs/

          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }

          DARWIN_SIG=$(read_sig "sigs/MotrixNext_aarch64.app.tar.gz.sig")
          WINDOWS_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_x64-setup.exe.sig")
          LINUX_X64_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_amd64.AppImage.sig")
          LINUX_ARM_SIG=$(read_sig "sigs/MotrixNext_${VERSION}_aarch64.AppImage.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg darwin_url "$BASE/MotrixNext_aarch64.app.tar.gz" \
            --arg win_sig "$WINDOWS_SIG" \
            --arg win_url "$BASE/MotrixNext_${VERSION}_x64-setup.exe" \
            --arg lx64_sig "$LINUX_X64_SIG" \
            --arg lx64_url "$BASE/MotrixNext_${VERSION}_amd64.AppImage" \
            --arg larm_sig "$LINUX_ARM_SIG" \
            --arg larm_url "$BASE/MotrixNext_${VERSION}_aarch64.AppImage" \
            '{
              version: $version,
              notes: "",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "linux-x86_64": { signature: $lx64_sig, url: $lx64_url },
                "linux-aarch64": { signature: $larm_sig, url: $larm_url }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json --clobber -R "${{ github.repository }}"
          echo "Uploaded latest.json to release $TAG"
